<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bendita Parrillada - Valledupar</title>
 <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      color:#fff;
      font-family: 'Arial', sans-serif;
      text-align:center;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.55)), 
                  url('fondoparrilla.jpg') center/cover no-repeat fixed;
    }
    .ubicacion { 
      color:#ff6a00; 
      letter-spacing:3px; 
      font-size:12px; 
      margin-bottom:20px; 
      font-weight:600; 
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }
    h1 { 
      font-size:48px; 
      color:#fff; 
      margin-bottom:8px; 
      text-transform:uppercase; 
      text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
    }
    .subtitulo { 
      color:#ff6a00; 
      font-size:16px; 
      font-weight:700; 
      margin-bottom:8px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }
    .slogan { 
      color:#eee; 
      font-style:italic; 
      margin-bottom:40px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }
    .botones { 
      display:flex; 
      gap:15px; 
      flex-wrap:wrap;
      justify-content:center; 
      width:100%; 
      max-width:400px; 
    }
    .btn {
      padding:18px 24px; 
      text-decoration:none; 
      font-weight:800; 
      border-radius:10px;
      transition:0.3s; 
      flex:1; 
      min-width:160px;
      text-transform:uppercase; 
      font-size:14px;
      box-shadow: 0 6px 20px rgba(255,106,0,0.4);
    }
    .btn-primario { 
      background:#ff6a00; 
      color:#000; 
    }
    .btn-primario:hover { 
      background:#ff8533; 
      transform:translateY(-3px); 
    }
  </style>
</head>
<body>
  <p class="ubicacion">VALLEDUPAR • COLOMBIA</p>
  <h1>BENDITA PARILLADA</h1>
  <p class="subtitulo">CARNES PREMIUM</p>
  <p class="slogan">Fuego alto Sabor bendito.</p>
  
<div class="botones">
  <a href="menu.html" class="btn btn-primario">Ver Nuestra Carta</a>
</div>
</body>
</html>
