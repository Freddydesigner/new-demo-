<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bendita Parrillada - Valledupar</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      color:#fff;
      font-family: 'Arial', sans-serif;
      text-align:center;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fondo-parrilla.jpg');
      background-size: cover;
      background-position: center;
    }
    .ubicacion { color:#ff6a00; letter-spacing:3px; font-size:12px; margin-bottom:20px; font-weight:600; }
    h1 { font-size:48px; color:#fff; margin-bottom:8px; text-transform:uppercase; }
    .subtitulo { color:#ff6a00; font-size:16px; font-weight:700; margin-bottom:8px; }
    .slogan { color:#aaa; font-style:italic; margin-bottom:40px; }
    .botones { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; width:100%; max-width:400px; }
    .btn {
      padding:16px 24px; text-decoration:none; font-weight:800; border-radius:4px;
      transition:0.3s; flex:1; min-width:160px; text-transform:uppercase; font-size:14px;
    }
    .btn-primario { background:#ff6a00; color:#000; }
    .btn-primario:hover { background:#ff8533; transform:scale(1.05); }
    .btn-secundario { background:transparent; color:#fff; border:2px solid #ff6a00; }
    .btn-secundario:hover { background:#ff6a00; color:#000; transform:scale(1.05); }
  </style>
</head>
<body>
  <p class="ubicacion">VALLEDUPAR • COLOMBIA</p>
  <h1>BENDITA</h1>
  <p class="subtitulo">PARRILLA & CARNES PREMIUM</p>
  <p class="slogan">Fuego alto. Sabor bendito.</p>
  
  <div class="botones">
    <!-- AQUÍ ESTÁ EL SALTO A OTRA PÁGINA -->
    <a href="menu.html" class="btn btn-primario">Ver Nuestra Carta</a>
    <a href="info.html" class="btn btn-secundario">Nuestra Info</a>
  </div>
</body>
</html>
